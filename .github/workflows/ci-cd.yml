name: SecondBite CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  NODE_VERSION: "20"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: secondbite
          POSTGRES_PASSWORD: secondbite_test
          POSTGRES_DB: secondbite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Lint server
        working-directory: server
        run: npm run lint

      - name: Format check server
        working-directory: server
        run: npm run format:check

      - name: Generate Prisma client
        working-directory: server
        env:
          DATABASE_URL: postgresql://secondbite:secondbite_test@localhost:5432/secondbite_test
        run: npx prisma generate

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://secondbite:secondbite_test@localhost:5432/secondbite_test
        run: npx prisma migrate deploy

      - name: Jest tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://secondbite:secondbite_test@localhost:5432/secondbite_test
          NODE_ENV: test
          JWT_SECRET: ci_test_secret
        run: npm test -- --coverage

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Format check client
        working-directory: client
        run: npm run format:check

      - name: Build client
        working-directory: client
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: e2e
        run: npx playwright test

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Needs these secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY, EC2_DEPLOY_PATH
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_DEPLOY_PATH }}
            git pull origin main
            cd server && npm ci --omit=dev && cd ..
            cd client && npm ci && npm run build && cd ..
            cd server && npx prisma migrate deploy && cd ..
            pm2 restart secondbite-server || pm2 start server/dist/index.js --name secondbite-server
