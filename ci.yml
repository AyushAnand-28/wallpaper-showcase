name: CI with Bash Script

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-bash-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run inline bash script
        shell: bash
        run: |
          echo "This is an inline bash script running in a GitHub workflow!"
          echo "=========================================================="
          echo "Current directory is: $(pwd)"
          
          # You can add more complex logic here
          if [ -d "frontend" ]; then
            echo "Frontend directory exists."
          else
            echo "Frontend directory not found."
          fi

      - name: Create and run an external bash script
        shell: bash
        run: |
          # 1. Create a simple Bash script programmatically
          cat << 'EOF' > my_script.sh
          #!/bin/bash
          echo "Running from an external bash script file..."
          echo "The current time is $(date)"
          EOF
          
          # 2. Make it executable
          chmod +x my_script.sh
          
          # 3. Run it
          ./my_script.sh
